<!DOCTYPE html>
<html>

<head>
    <title>Route Optimizer</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            font-family: Arial;
        }

        #map {
            height: 500px;
            margin-top: 10px;
        }

        textarea {
            width: 100%;
            height: 100px;
        }

        .marker-label {
            background: #2c7be5;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Route Optimizer</h2>

    <p>Enter one address per line:</p>
    <textarea id="addresses"></textarea><br>
    <button onclick="optimizeRoute()">Optimize Route</button>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const apiKey = "INSERT YOUR OSM KEY HERE";
        const geoCache = JSON.parse(localStorage.getItem("geoCache") || "{}");

        function saveCache() {
            localStorage.setItem("geoCache", JSON.stringify(geoCache));
        }
        // Initialize map
        const map = L.map('map').setView([35.7, -78.8], 12);

        // Add OSM tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let routeLayer;
        let markers = [];

        // Geocode address → coordinates
        async function geocode(address) {
            if (geoCache[address]) {
                return geoCache[address];
            }

            // Small delay to avoid rate limit
            await new Promise(r => setTimeout(r, 1000));

            const res = await fetch(
                `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(address)}`
            );

            const data = await res.json();

            if (!data.length) {
                throw new Error("Address not found: " + address);
            }

            const coords = [
                parseFloat(data[0].lon),
                parseFloat(data[0].lat)
            ];

            // Save to cache
            geoCache[address] = coords;
            saveCache();

            return coords;
        }

        // Simple nearest optimization
        function optimizeNearest(coords) {
            const remaining = coords.slice(1);
            const route = [coords[0]];

            while (remaining.length) {
                let last = route[route.length - 1];

                let bestIndex = 0;
                let bestDist = Infinity;

                for (let i = 0; i < remaining.length; i++) {
                    const dx = last[0] - remaining[i][0];
                    const dy = last[1] - remaining[i][1];
                    const dist = dx * dx + dy * dy;

                    if (dist < bestDist) {
                        bestDist = dist;
                        bestIndex = i;
                    }
                }

                route.push(remaining.splice(bestIndex, 1)[0]);
            }

            return route;
        }

        // Core func
        async function optimizeRoute() {
            try {
                const input = document.getElementById("addresses").value;
                const entries = input.split("\n")
                    .filter(a => a.trim())
                    .map(line => {
                        const parts = line.split("|");
                        return {
                            name: parts[0]?.trim() || "Unnamed",
                            address: parts[1]?.trim() || parts[0]?.trim()
                        };
                    });

                if (addresses.length < 2) {
                    alert("Enter at least 2 addresses");
                    return;
                }

                // Geocode
                const coords = [];
                for (let entry of entries) {
                    const c = await geocode(entry.address);
                    coords.push(c);
                }

                // Optimize
                const indexed = coords.map((c, i) => ({
                    coord: c,
                    name: entries[i].name
                }));

                function optimizeWithNames(points) {
                    const remaining = points.slice(1);
                    const route = [points[0]];

                    while (remaining.length) {
                        let last = route[route.length - 1];

                        let bestIndex = 0;
                        let bestDist = Infinity;

                        for (let i = 0; i < remaining.length; i++) {
                            const dx = last.coord[0] - remaining[i].coord[0];
                            const dy = last.coord[1] - remaining[i].coord[1];
                            const dist = dx * dx + dy * dy;

                            if (dist < bestDist) {
                                bestDist = dist;
                                bestIndex = i;
                            }
                        }

                        route.push(remaining.splice(bestIndex, 1)[0]);
                    }

                    return route;
                }

                const optimized = optimizeWithNames(indexed);
                const ordered = optimized.map(p => p.coord);

                // Get route
                // Build coordinate string for OSRM
                const coordString = ordered.map(c => `${c[0]},${c[1]}`).join(";");

                // Fetch route from OSRM
                const routeRes = await fetch(
                    `https://router.project-osrm.org/route/v1/driving/${coordString}?overview=full&geometries=geojson`
                );

                const routeData = await routeRes.json();
                if (!routeData.routes || !routeData.routes.length) {
                    throw new Error("No route found");
                }
                // Convert to GeoJSON format Leaflet expects
                const geojson = {
                    type: "Feature",
                    geometry: routeData.routes[0].geometry
                };

                // Remove old route
                if (routeLayer) map.removeLayer(routeLayer);
                markers.forEach(m => map.removeLayer(m));
                markers = [];

                // Draw route
                routeLayer = L.geoJSON(geojson).addTo(map);

                // Add numbered markers
                optimized.forEach((point, i) => {
                    const marker = L.marker([point.coord[1], point.coord[0]], {
                        icon: L.divIcon({
                            className: 'marker-label',
                            html: i + 1,
                            iconSize: [24, 24]
                        })
                    })
                        .addTo(map)
                        .bindPopup(point.name);

                    markers.push(marker);
                });

                // Map formatting
                map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

            } catch (err) {
                console.error(err);
                alert("Error: " + err.message);
            }
        }
    </script>

</body>

</html>
